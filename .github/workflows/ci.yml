name: CI

# Continuous integration: build + test on every push and PR to main.
# This workflow NEVER publishes and NEVER requests id-token. The release path
# lives entirely in release.yml, gated on a tag push.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege. CI only reads the repo; no write scopes, no OIDC.
permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Matches pyproject `requires-python = ">=3.9"` (no upper bound declared,
        # no classifiers). 3.9 is the floor; 3.12 is the current support ceiling.
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and tooling
        run: python -m pip install -e . pytest build

      - name: Run tests (offline; fully mocked, no live FDIC calls)
        # The suite is fully mocked — no network. --import-mode=importlib is also
        # set in pyproject addopts; passed here explicitly as belt-and-suspenders.
        run: python -m pytest --import-mode=importlib
